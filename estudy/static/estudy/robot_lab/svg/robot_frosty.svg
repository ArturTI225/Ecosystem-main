<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" width="60" height="60">
  <!-- FROSTY: Blue crystal robot -->
  <g class="robot-skin robot-skin--frosty">
    <g class="robot__antenna">
      <line x1="30" y1="4" x2="30" y2="13" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>
      <polygon points="30,1 26,7 34,7" fill="#60A5FA" opacity="0.9"/>
    </g>
    <polygon class="robot__head" points="12,14 48,14 44,38 16,38" fill="#0F172A" stroke="#60A5FA" stroke-width="1.5"/>
    <g class="robot__eyes">
      <polygon points="20,22 28,22 27,30 21,30" fill="#60A5FA" class="robot__eye robot__eye--left"/>
      <polygon points="32,22 40,22 39,30 33,30" fill="#60A5FA" class="robot__eye robot__eye--right"/>
      <circle cx="24" cy="24" r="1.8" fill="#fff" opacity="0.9"/>
      <circle cx="36" cy="24" r="1.8" fill="#fff" opacity="0.9"/>
    </g>
    <rect class="robot__mouth" x="23" y="33" width="14" height="2" rx="1" fill="#93C5FD"/>
    <polygon class="robot__body" points="14,40 46,40 43,56 17,56" fill="#0F172A" stroke="#60A5FA" stroke-width="1.5"/>
    <circle cx="30" cy="48" r="3.5" fill="#60A5FA" opacity="0.6" class="robot__core"/>
  </g>
</svg>
