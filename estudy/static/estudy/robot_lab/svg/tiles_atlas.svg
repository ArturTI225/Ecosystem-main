<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!-- Tile decorations as SVG symbols -->

  <symbol id="tile-battery" viewBox="0 0 24 24">
    <rect x="7" y="6" width="10" height="14" rx="2" fill="#FBBF24" stroke="#F59E0B" stroke-width="1"/>
    <rect x="10" y="4" width="4" height="3" rx="1" fill="#F59E0B"/>
    <rect x="10" y="11" width="4" height="5" rx="0.5" fill="#FEF3C7"/>
  </symbol>

  <symbol id="tile-key" viewBox="0 0 24 24">
    <circle cx="10" cy="9" r="4" fill="none" stroke="#FBBF24" stroke-width="2"/>
    <rect x="13" y="7" width="8" height="3" rx="1" fill="#FBBF24"/>
    <rect x="18" y="10" width="3" height="2" rx="0.5" fill="#FBBF24"/>
  </symbol>

  <symbol id="tile-door" viewBox="0 0 24 24">
    <rect x="5" y="2" width="14" height="20" rx="2" fill="#78716C" stroke="#A8A29E" stroke-width="1"/>
    <circle cx="16" cy="13" r="1.5" fill="#FBBF24"/>
    <rect x="8" y="4" width="8" height="10" rx="1" fill="#57534E"/>
  </symbol>

  <symbol id="tile-portal" viewBox="0 0 24 24">
    <ellipse cx="12" cy="12" rx="8" ry="10" fill="none" stroke="#A78BFA" stroke-width="2" opacity="0.8"/>
    <ellipse cx="12" cy="12" rx="5" ry="7" fill="none" stroke="#C4B5FD" stroke-width="1.5" opacity="0.6"/>
    <circle cx="12" cy="12" r="2" fill="#8B5CF6" opacity="0.9"/>
  </symbol>

  <symbol id="tile-hazard" viewBox="0 0 24 24">
    <polygon points="12,2 22,20 2,20" fill="#EF4444" opacity="0.8"/>
    <text x="12" y="17" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">!</text>
  </symbol>

  <symbol id="tile-terminal" viewBox="0 0 24 24">
    <rect x="4" y="4" width="16" height="12" rx="2" fill="#1E293B" stroke="#22C55E" stroke-width="1.5"/>
    <rect x="6" y="6" width="12" height="8" rx="1" fill="#064E3B"/>
    <line x1="8" y1="9" x2="12" y2="9" stroke="#22C55E" stroke-width="1"/>
    <line x1="8" y1="11" x2="14" y2="11" stroke="#22C55E" stroke-width="1" opacity="0.5"/>
    <rect x="8" y="17" width="8" height="2" rx="0.5" fill="#475569"/>
  </symbol>

  <symbol id="tile-ice" viewBox="0 0 24 24">
    <rect x="1" y="1" width="22" height="22" rx="2" fill="#DBEAFE" opacity="0.3"/>
    <line x1="4" y1="4" x2="8" y2="8" stroke="#93C5FD" stroke-width="0.5" opacity="0.5"/>
    <line x1="16" y1="4" x2="20" y2="8" stroke="#93C5FD" stroke-width="0.5" opacity="0.5"/>
    <line x1="10" y1="14" x2="14" y2="18" stroke="#93C5FD" stroke-width="0.5" opacity="0.5"/>
  </symbol>

  <symbol id="tile-lava" viewBox="0 0 24 24">
    <rect x="1" y="1" width="22" height="22" rx="2" fill="#DC2626" opacity="0.6"/>
    <ellipse cx="8" cy="12" rx="3" ry="4" fill="#F97316" opacity="0.7"/>
    <ellipse cx="16" cy="10" rx="4" ry="5" fill="#FB923C" opacity="0.5"/>
  </symbol>

  <symbol id="tile-heater" viewBox="0 0 24 24">
    <rect x="3" y="3" width="18" height="18" rx="3" fill="#F59E0B" opacity="0.3"/>
    <circle cx="12" cy="12" r="5" fill="#EF4444" opacity="0.4"/>
    <line x1="9" y1="8" x2="9" y2="16" stroke="#F97316" stroke-width="1.5" opacity="0.6"/>
    <line x1="12" y1="7" x2="12" y2="17" stroke="#F97316" stroke-width="1.5" opacity="0.6"/>
    <line x1="15" y1="8" x2="15" y2="16" stroke="#F97316" stroke-width="1.5" opacity="0.6"/>
  </symbol>

  <symbol id="tile-coolant" viewBox="0 0 24 24">
    <circle cx="12" cy="12" r="8" fill="#0EA5E9" opacity="0.3"/>
    <polygon points="12,4 14,10 20,10 15,14 17,20 12,16 7,20 9,14 4,10 10,10" fill="#38BDF8" opacity="0.6"/>
  </symbol>
</svg>
