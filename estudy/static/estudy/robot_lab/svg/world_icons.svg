<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!-- World 1: Garden -->
  <symbol id="world-garden" viewBox="0 0 48 48">
    <circle cx="24" cy="24" r="20" fill="#064E3B"/>
    <ellipse cx="24" cy="30" rx="16" ry="10" fill="#166534"/>
    <line x1="24" y1="10" x2="24" y2="24" stroke="#15803D" stroke-width="2"/>
    <circle cx="24" cy="10" r="5" fill="#22C55E"/>
    <circle cx="18" cy="14" r="3" fill="#4ADE80"/>
    <circle cx="30" cy="12" r="4" fill="#16A34A"/>
  </symbol>

  <!-- World 2: Ice Cave -->
  <symbol id="world-ice" viewBox="0 0 48 48">
    <circle cx="24" cy="24" r="20" fill="#1E3A5F"/>
    <polygon points="24,6 30,22 18,22" fill="#DBEAFE" opacity="0.8"/>
    <polygon points="16,14 22,28 10,28" fill="#93C5FD" opacity="0.6"/>
    <polygon points="32,16 38,30 26,30" fill="#BFDBFE" opacity="0.7"/>
    <rect x="8" y="30" width="32" height="10" rx="4" fill="#60A5FA" opacity="0.4"/>
  </symbol>

  <!-- World 3: Volcano -->
  <symbol id="world-volcano" viewBox="0 0 48 48">
    <circle cx="24" cy="24" r="20" fill="#451A03"/>
    <polygon points="24,6 38,36 10,36" fill="#78350F"/>
    <polygon points="24,6 30,20 18,20" fill="#DC2626" opacity="0.8"/>
    <ellipse cx="24" cy="10" rx="6" ry="3" fill="#F97316" opacity="0.7"/>
    <rect x="8" y="36" width="32" height="6" rx="3" fill="#92400E"/>
  </symbol>

  <!-- World 4: Space Station -->
  <symbol id="world-space" viewBox="0 0 48 48">
    <circle cx="24" cy="24" r="20" fill="#1E1B4B"/>
    <circle cx="12" cy="12" r="1" fill="#fff" opacity="0.6"/>
    <circle cx="36" cy="10" r="0.8" fill="#fff" opacity="0.5"/>
    <circle cx="8" cy="30" r="0.6" fill="#fff" opacity="0.4"/>
    <circle cx="40" cy="28" r="1" fill="#fff" opacity="0.6"/>
    <rect x="16" y="16" width="16" height="16" rx="3" fill="#312E81" stroke="#8B5CF6" stroke-width="1"/>
    <circle cx="24" cy="24" r="4" fill="#8B5CF6" opacity="0.6"/>
    <rect x="10" y="22" width="6" height="4" rx="1" fill="#4C1D95"/>
    <rect x="32" y="22" width="6" height="4" rx="1" fill="#4C1D95"/>
  </symbol>

  <!-- World 5: The Core -->
  <symbol id="world-core" viewBox="0 0 48 48">
    <circle cx="24" cy="24" r="20" fill="#1C1917"/>
    <circle cx="24" cy="24" r="14" fill="none" stroke="#EF4444" stroke-width="1" opacity="0.5"/>
    <circle cx="24" cy="24" r="9" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.6"/>
    <circle cx="24" cy="24" r="5" fill="#EF4444" opacity="0.8"/>
    <circle cx="24" cy="24" r="2" fill="#FBBF24"/>
    <line x1="24" y1="4" x2="24" y2="10" stroke="#F97316" stroke-width="0.5" opacity="0.4"/>
    <line x1="24" y1="38" x2="24" y2="44" stroke="#F97316" stroke-width="0.5" opacity="0.4"/>
    <line x1="4" y1="24" x2="10" y2="24" stroke="#F97316" stroke-width="0.5" opacity="0.4"/>
    <line x1="38" y1="24" x2="44" y2="24" stroke="#F97316" stroke-width="0.5" opacity="0.4"/>
  </symbol>
</svg>
