<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!-- Run -->
  <symbol id="icon-run" viewBox="0 0 24 24">
    <polygon points="6,4 20,12 6,20" fill="currentColor"/>
  </symbol>

  <!-- Step -->
  <symbol id="icon-step" viewBox="0 0 24 24">
    <polygon points="4,4 14,12 4,20" fill="currentColor"/>
    <rect x="16" y="4" width="3" height="16" rx="1" fill="currentColor"/>
  </symbol>

  <!-- Reset -->
  <symbol id="icon-reset" viewBox="0 0 24 24">
    <path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z" fill="currentColor"/>
  </symbol>

  <!-- Hint (lightbulb) -->
  <symbol id="icon-hint" viewBox="0 0 24 24">
    <path d="M9 21h6v-1H9v1zm3-19C8.14 2 5 5.14 5 9c0 2.38 1.19 4.47 3 5.74V17c0 .55.45 1 1 1h6c.55 0 1-.45 1-1v-2.26c1.81-1.27 3-3.36 3-5.74 0-3.86-3.14-7-7-7zm2.85 11.1l-.85.6V16h-4v-2.3l-.85-.6C7.8 12.16 7 10.63 7 9c0-2.76 2.24-5 5-5s5 2.24 5 5c0 1.63-.8 3.16-2.15 4.1z" fill="currentColor"/>
  </symbol>

  <!-- Settings (gear) -->
  <symbol id="icon-settings" viewBox="0 0 24 24">
    <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z" fill="currentColor"/>
  </symbol>

  <!-- Star (filled) -->
  <symbol id="icon-star" viewBox="0 0 24 24">
    <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill="currentColor"/>
  </symbol>

  <!-- Star (empty) -->
  <symbol id="icon-star-empty" viewBox="0 0 24 24">
    <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" fill="none" stroke="currentColor" stroke-width="1.5"/>
  </symbol>

  <!-- Lock -->
  <symbol id="icon-lock" viewBox="0 0 24 24">
    <rect x="6" y="10" width="12" height="12" rx="2" fill="currentColor"/>
    <path d="M8 10V7c0-2.21 1.79-4 4-4s4 1.79 4 4v3" fill="none" stroke="currentColor" stroke-width="2"/>
  </symbol>

  <!-- Menu (hamburger) -->
  <symbol id="icon-menu" viewBox="0 0 24 24">
    <rect x="3" y="5" width="18" height="2" rx="1" fill="currentColor"/>
    <rect x="3" y="11" width="18" height="2" rx="1" fill="currentColor"/>
    <rect x="3" y="17" width="18" height="2" rx="1" fill="currentColor"/>
  </symbol>

  <!-- Sound on -->
  <symbol id="icon-sound-on" viewBox="0 0 24 24">
    <polygon points="6,9 2,9 2,15 6,15 11,19 11,5" fill="currentColor"/>
    <path d="M14 8.5c1.25.94 2 2.44 2 3.5s-.75 2.56-2 3.5" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M16.5 6c2 1.5 3.5 4 3.5 6s-1.5 4.5-3.5 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

  <!-- Sound off -->
  <symbol id="icon-sound-off" viewBox="0 0 24 24">
    <polygon points="6,9 2,9 2,15 6,15 11,19 11,5" fill="currentColor"/>
    <line x1="15" y1="9" x2="21" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="21" y1="9" x2="15" y2="15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>
</svg>
