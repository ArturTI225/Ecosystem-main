{% load static %}
<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ lesson_title }} — UnITex Victory</title>
    <meta property="og:title" content="{{ username }} a completat {{ lesson_title }}!">
    <meta property="og:description" content="+{{ xp_earned }} XP castigati pe platforma UnITex">
    <meta property="og:type" content="website">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="{% static 'estudy/style.css' %}?v=20260410a">
</head>
<body>
    <div class="share-card-page">
        <div class="share-card">
            <div class="share-card__logo">&#127891; UNITEX</div>
            <div class="share-card__title">{{ lesson_title }}</div>
            <div class="share-card__xp">&#9889; +{{ xp_earned }} XP</div>
            <div class="share-card__xp-label">&#127881; Lectie completata cu succes!</div>
            <div class="share-card__user">
                <strong>{{ username }}</strong> · &#11088; Nivel {{ level }}
                {% if current_streak > 0 %}
                    · <i class="fa-solid fa-fire" style="color:#F59E0B"></i> {{ current_streak }} zile streak
                {% endif %}
            </div>
        </div>
    </div>
</body>
</html>
